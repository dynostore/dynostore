version: "3.8"

x-kagio-env: &kagio-env
  # KAGIO ENVIRONMENT VARIABLES
  API_BASE_URL: "http://10.18.173.209:8080"
  ROOT_USER: "root"
  KAGIO_FOXX_URL: "http://localhost:8529/_db/_system/kagio"
  KAGIO_FOXX_DB: "fgcs"
  ENABLE_KAGIO: "${ENABLE_KAGIO:-true}"
  ENABLE_REPLICATOR: "${ENABLE_REPLICATOR:-true}"

services:
  # metadata:
  #   build:
  #     args:
  #       user: metadata
  #       uid: 1000
  #     context: ./metadata
  #     dockerfile: Dockerfile
  #   image: dynostore/metadata:v2
  #   restart: always
  #   working_dir: /var/www/
  #   volumes:
