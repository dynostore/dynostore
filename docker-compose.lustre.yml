  #       ipv4_address: 10.88.0.10

  apigateway:
    image: dynostore/apigateway:v1.1
    build: 
      context: ./APIGateway
      dockerfile: Dockerfile
    ports:
        - "8070:80"
    volumes:
      - ./APIGateway/app/:/app
    environment:
      <<: *kagio-env
      AUTH_HOST: auth
      PUB_SUB_HOST: pub_sub
      METADATA_HOST: metadata_server
      PUBLIC_IP: 10.18.173.209
      LOG_WATCHER_LOG_FILE: /app/logs/kagio.log
      LOG_FILES: '["/app/logs/dynostore.log"]'
    restart: always
    networks:
      dynonetwork:
        ipv4_address: 10.88.0.11
    entrypoint: ["/entrypoint.sh"]

  metadata_server:
    image: dynostore/metadata:v3.1
    build: 
      context: ./metadata
      dockerfile: Dockerfile
    ports:
        - "8095:80"
    volumes:
      - ./metadata/app/:/var/www
    environment:
      <<: *kagio-env
      APIGATEWAY_HOST: apigateway
      AUTH_HOST: auth
    restart: always
    networks:
      dynonetwork:
        ipv4_address: 10.88.0.12
    working_dir: /var/www
    entrypoint: ["sh", "-c", "/start.sh"]

  # metadata_server:
  #   image: nginx:1.17-alpine
  #   restart: unless-stopped
  #   ports:
  #     - 8005:80
  #   volumes:
  #     - ./metadata/app:/var/www
