      - ./datacontainer/code/:/app
      - /lustre/uc3m_a0/dynamic/dantedomizzi/dynostore_data/datacontainer1/objects:/data/objects:rw
    environment:
      <<: *kagio-env
      AUTH_HOST: auth
      APIGATEWAY_HOST: apigateway
      DATA_CONTAINER_ID: 1
      LOG_WATCHER_LOG_FILE: /app/logs/kagio1.log
      LOG_FILES: '["/app/logs/datacontainer-1.log"]'
    networks:
      dynonetwork:
        ipv4_address: 10.88.0.19
    entrypoint: ["sh", "-c", "/start.sh"]
    
